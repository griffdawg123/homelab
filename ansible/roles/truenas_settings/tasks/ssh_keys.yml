---
- name: Fetch all users
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/user"
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
  register: r_users

- name: Push SSH public keys to users
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/user/id/{{ (r_users.json | selectattr('username', 'equalto', item.username) | list | first).id }}"
    method: PUT
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      sshpubkey: "{{ item.pubkeys | join('\n') }}"
    status_code: 200
  loop: "{{ truenas_ssh_keys }}"
  loop_control:
    label: "{{ item.username }}"
  when: r_users.json | selectattr('username', 'equalto', item.username) | list | length > 0
