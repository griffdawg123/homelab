---
- name: Enable SSH service (start on boot)
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/id/ssh"
    method: PUT
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      enable: "{{ truenas_ssh_enabled }}"
    status_code: 200

- name: Start SSH service
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/start"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      service: ssh
    status_code: [200, 202]
  when: truenas_ssh_enabled
