---
- name: Apply general system settings
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/system/general"
    method: PUT
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      timezone: "{{ truenas_timezone }}"
      ui_httpsport: "{{ truenas_ui_https_port }}"
    status_code: 200

- name: Ensure NTP servers are configured
  ansible.builtin.include_tasks: ntp.yml

- name: Ensure SSH is enabled and running
  ansible.builtin.include_tasks: ssh.yml

- name: Push SSH public keys
  ansible.builtin.include_tasks: ssh_keys.yml
  when: truenas_ssh_keys is defined and truenas_ssh_keys | length > 0
