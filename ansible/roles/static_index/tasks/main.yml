---
- name: Write index generator script to stowage-share
  ansible.builtin.copy:
    src: gen-static-index.sh
    dest: "{{ lookup('env', 'HOME') }}/stowage-share/gen-static-index.sh"
    mode: "0755"

- name: Fetch existing cron jobs
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/cronjob"
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
  register: r_cronjobs

- name: Create static index cron job
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/cronjob"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      user: "root"
      command: "sh /mnt/stowage/stowage-share/gen-static-index.sh"
      description: "Regenerate static.griffdawg.dev index"
      schedule:
        minute: "*/5"
        hour: "*"
        dom: "*"
        month: "*"
        dow: "*"
      enabled: true
      stdout: true
      stderr: true
    status_code: [200, 201]
  when: r_cronjobs.json | selectattr('command', 'equalto', 'sh /mnt/stowage/stowage-share/gen-static-index.sh') | list | length == 0
