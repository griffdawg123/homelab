---
# Writes a custom.config.php to override trusted_domains and trusted_proxies.
# The NEXTCLOUD_TRUSTED_DOMAINS env var only applies on first install; this file
# persists across container restarts and app updates.

- name: Write Nextcloud custom config
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/filesystem/put"
    method: POST
    headers:
      Authorization: "Bearer {{ truenas_api_key }}"
    body_format: form-multipart
    body:
      data: >-
        {"path": "/mnt/stowage/nextcloud/html/config/custom.config.php",
         "options": {"mode": "0644", "uid": 33, "gid": 33}}
      file:
        content: "{{ lookup('template', 'nextcloud_custom.config.php.j2') }}"
        filename: custom.config.php
        mime_type: text/plain
    validate_certs: "{{ truenas_validate_certs }}"
    status_code: [200, 201]
