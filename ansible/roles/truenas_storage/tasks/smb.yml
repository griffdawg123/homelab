---
- name: Get existing SMB shares
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/sharing/smb"
    method: GET
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
  register: smb_existing

- name: Create SMB shares
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/sharing/smb"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      path: "/mnt/{{ share.dataset }}"
      name: "{{ share.smb.name }}"
      comment: "{{ share.smb.comment | default('') }}"
      ro: "{{ share.smb.ro | default(false) }}"
    status_code: 200
  loop: "{{ truenas_shares }}"
  loop_control:
    loop_var: share
    label: "{{ share.dataset }}"
  when:
    - share.smb.enabled | default(false)
    - smb_existing.json | selectattr('path', 'equalto', '/mnt/' ~ share.dataset) | list | length == 0
