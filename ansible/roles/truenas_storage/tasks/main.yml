---
- name: Ensure SMB service is enabled and running
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/id/cifs"
    method: PUT
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      enable: true
    status_code: 200
  when: truenas_shares | selectattr('smb.enabled', 'defined') | selectattr('smb.enabled') | list | length > 0

- name: Start SMB service if not running
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/start"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      service: cifs
    status_code: [200, 202]
  when: truenas_shares | selectattr('smb.enabled', 'defined') | selectattr('smb.enabled') | list | length > 0

- name: Ensure NFS service is enabled and running
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/id/nfs"
    method: PUT
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      enable: true
    status_code: 200
  when: truenas_shares | selectattr('nfs.enabled', 'defined') | selectattr('nfs.enabled') | list | length > 0

- name: Start NFS service if not running
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/start"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      service: nfs
    status_code: [200, 202]
  when: truenas_shares | selectattr('nfs.enabled', 'defined') | selectattr('nfs.enabled') | list | length > 0

- name: Configure datasets and shares
  ansible.builtin.include_tasks: "{{ item }}"
  loop:
    - dataset.yml
    - smb.yml
    - nfs.yml
