---
- name: Get existing NFS shares
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/sharing/nfs"
    method: GET
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
  register: nfs_existing

- name: Create NFS shares
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/sharing/nfs"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      # TrueNAS SCALE 24.04+ uses "path" (string). Older SCALE used "paths" (array).
      path: "/mnt/{{ share.dataset }}"
      comment: "{{ share.nfs.comment | default('') }}"
      networks: "{{ share.nfs.networks | default([]) }}"
      hosts: "{{ share.nfs.hosts | default([]) }}"
      ro: "{{ share.nfs.ro | default(false) }}"
    status_code: 200
  loop: "{{ truenas_shares }}"
  loop_control:
    loop_var: share
    label: "{{ share.dataset }}"
  when:
    - share.nfs.enabled | default(false)
    - share.nfs is defined
    - nfs_existing.json | selectattr('path', 'equalto', '/mnt/' ~ share.dataset) | list | length == 0
