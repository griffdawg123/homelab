---
- name: Fetch existing users
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/user"
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
  register: r_users

- name: Create users that don't exist
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/user"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      username:     "{{ item.username }}"
      full_name:    "{{ item.full_name | default(item.username) }}"
      password:     "{{ truenas_user_passwords[item.username] }}"
      smb:          "{{ item.smb | default(true) }}"
      shell:        "/usr/sbin/nologin"
      home:         "/nonexistent"
      group_create: true
    status_code: 200
  loop: "{{ truenas_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: r_users.json | selectattr('username', 'equalto', item.username) | list | length == 0
