---
- name: Load app definition
  ansible.builtin.include_vars:
    file: "{{ app_file }}"
    name: app

- name: "Install catalog app: {{ app.app_name }} (if not present)"
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/app"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      app_name:    "{{ app.app_name }}"
      catalog_app: "{{ app.catalog_app }}"
      train:       "{{ app.train | default('stable') }}"
      values:      "{{ app.values | default({}) }}"
    status_code: [200, 202]
  when:
    - app.type | default('catalog') == 'catalog'
    - installed_apps | selectattr('name', 'equalto', app.app_name) | list | length == 0

- name: "Install custom app: {{ app.app_name }} (if not present)"
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/app"
    method: POST
    headers: "{{ truenas_api_headers }}"
    validate_certs: "{{ truenas_validate_certs }}"
    body_format: json
    body:
      app_name: "{{ app.app_name }}"
      custom_app: true
      custom_compose_config_string: "{{ app.compose | to_yaml }}"
    status_code: [200, 202]
  when:
    - app.type | default('catalog') == 'custom'
    - installed_apps | selectattr('name', 'equalto', app.app_name) | list | length == 0
