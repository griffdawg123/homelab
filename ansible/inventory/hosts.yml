---
all:
  children:
    truenas:
      hosts:
        truenas:
          # All tasks talk to TrueNAS via its REST API, not SSH.
          ansible_connection: local
      children:
        # Used for SSH-based file operations (writing config files, running docker compose).
        # Inherits all vars from the truenas group.
        truenas_files:
          hosts:
            truenas_ssh:
              ansible_host: 192.168.1.104
              ansible_user: truenas_admin
