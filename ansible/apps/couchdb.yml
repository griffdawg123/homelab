---
app_name: couchdb
type: custom

compose:
  services:
    couchdb:
      container_name: couchdb
      image: couchdb:3
      restart: unless-stopped
      network_mode: bridge
      ports:
        - "30050:5984/tcp"
      environment:
        COUCHDB_USER: "{{ couchdb_admin_user }}"
        COUCHDB_PASSWORD: "{{ couchdb_admin_password }}"
      volumes:
        - /mnt/stowage/couchdb/data:/opt/couchdb/data
        - /mnt/stowage/couchdb/config:/opt/couchdb/etc/local.d
